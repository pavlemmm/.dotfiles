#############
# WINDOW RULES & EXEC
#

# Floating windows
for_window [app_id="org.pulseaudio.pavucontrol"] floating enable

exec noctalia-shell

# Wayland forcing
exec export GDK_BACKEND="wayland,x11"
exec export QT_QPA_PLATFORM="wayland;xcb"

# Qt theming
# exec export QT_QPA_PLATFORMTHEME="qt6ct"

# Chromium / Electron
exec export NIXOS_OZONE_WL="1"
exec export OZONE_PLATFORM="wayland"

# Java fix for Wayland
exec export _JAVA_AWT_WM_NONREPARENTING="1"

# Cursor consistency
exec export XCURSOR_SIZE="20"


# Polkit agent
# exec /usr/lib/policykit-1-gnome/polkit-gnome-authentication-agent-1

# Idle / swaylock handled in theme colors
# exec swayidle -w \
#          timeout 300 'swaylock -f -c 000000' \
#          timeout 600 'swaymsg "output * power off"' resume 'swaymsg "output * power on"' \
#          before-sleep 'swaylock -f -c 000000'

# This will lock your screen after 300 seconds of inactivity, then turn off
# your displays after another 300 seconds, and turn your screens back on when
# resumed. It will also lock your screen before your computer goes to sleep.
