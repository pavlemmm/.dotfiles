#############
# INPUT DEVICES
#

# You can get the names of your inputs by running: swaymsg -t get_inputs

# Pointer
input "type:pointer" accel_profile flat

# Keyboard
input type:keyboard {
    xkb_layout us,rs(latinunicode),rs
    xkb_options grp:alt_shift_toggle,caps:escape,ctrl:swap_lalt_lctl,altwin:swap_ralt_rwin
    repeat_delay 200
    repeat_rate 40
}

input "type:touchpad" {
    tap enabled
    natural_scroll enabled
    middle_emulation enabled
    dwt enabled
    tap_button_map lrm
    scroll_method two_finger
}   
