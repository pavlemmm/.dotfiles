###################
### KEYBINDINGS ###
###################

$mainMod = SUPER

#########
# LAUNCH
bind = $mainMod, RETURN, exec, $terminal
bind = $mainMod, Q,      exec, $browser

###########
# NOCTALIA
bind = $mainMod, A,               exec, noctalia-shell ipc call launcher toggle
bind = $mainMod, T,               exec, noctalia-shell ipc call nightLight toggle
bind = $mainMod, V,               exec, noctalia-shell ipc call launcher clipboard
bind = $mainMod, ESCAPE,          exec, noctalia-shell ipc call sessionMenu toggle
bind = $mainMod, SEMICOLON,       exec, noctalia-shell ipc call controlCenter toggle
bind = $mainMod SHIFT, SEMICOLON, exec, noctalia-shell ipc call settings toggle
bind = $mainMod, PERIOD,          exec, noctalia-shell ipc call launcher emoji

bind = , XF86AudioRaiseVolume,  exec, noctalia-shell ipc call volume increase
bind = , XF86AudioLowerVolume,  exec, noctalia-shell ipc call volume decrease
bind = , XF86AudioMute,         exec, noctalia-shell ipc call volume muteOutput
bind = , XF86AudioMicMute,      exec, noctalia-shell ipc call volume muteInput
bind = , XF86MonBrightnessUp,   exec, noctalia-shell ipc call brightness increase
bind = , XF86MonBrightnessDown, exec, noctalia-shell ipc call brightness decrease
bind = , XF86AudioPlay,         exec, noctalia-shell ipc call media playPause
bind = , XF86AudioStop,         exec, noctalia-shell ipc call media stop
bind = , XF86AudioPrev,         exec, noctalia-shell ipc call media previous
bind = , XF86AudioNext,         exec, noctalia-shell ipc call media next


#######################
# WINDOW / WM CONTROLS
bind = $mainMod, W, killactive,
bind = $mainMod SHIFT, SPACE, fullscreen, 2
bind = $mainMod, F, togglefloating,


#############
# WORKSPACES
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10


#############
# SCRATCHPAD
bind = $mainMod, S,       togglespecialworkspace, sp
bind = $mainMod SHIFT, S, movetoworkspace, special:sp


#############
# NAVIGATION
# Focus move
bind = $mainMod CTRL, H, movefocus, l
bind = $mainMod CTRL, L, movefocus, r
bind = $mainMod CTRL, J, movefocus, d
bind = $mainMod CTRL, K, movefocus, u

# Mouse move/resize
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


#########
# GROUPS
# bind = $mainMod, TAB,     togglegroup
# bind = $mainMod SHIFT, H, movewindoworgroup, l
# bind = $mainMod SHIFT, L, movewindoworgroup, r
# bind = $mainMod SHIFT, K, movewindoworgroup, u
# bind = $mainMod SHIFT, J, movewindoworgroup, d


#########
# RESIZE
# binde = $mainMod CTRL, H, resizeactive, -100 0
# binde = $mainMod CTRL, L, resizeactive,  100 0
# binde = $mainMod CTRL, J, resizeactive,  0 100
# binde = $mainMod CTRL, K, resizeactive,  0 -100


#####################
### SCROLLING LAYOUT

# Scroll tape by columns
bind = $mainMod, L, layoutmsg, move +col
bind = $mainMod, H, layoutmsg, move -col

# Swap current column with neighbor
bind = $mainMod SHIFT, L, layoutmsg, swapcol r
bind = $mainMod SHIFT, H,  layoutmsg, swapcol l

# Promote: put current window into its own column
bind = $mainMod, BRACKETRIGHT, layoutmsg, promote

# Fit operations
bind = $mainMod, SPACE, layoutmsg, fit active
bind = $mainMod, I, layoutmsg, fit visible
bind = $mainMod, O, layoutmsg, fit all
bind = $mainMod CTRL, H, layoutmsg, fit tobeg
bind = $mainMod CTRL, L, layoutmsg, fit toend

# Column resize: cycle configured widths
bind = $mainMod, EQUAL, layoutmsg, colresize +conf
bind = $mainMod, MINUS,  layoutmsg, colresize -conf
