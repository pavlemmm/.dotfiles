#############
# APPEARANCE
#

default_border pixel 1
gaps inner 2
gaps outer 8

# Animations
animations {
    enabled yes
    default yes 200 var 3 [ 0.215 0.61 0.355 1 ]
    window_open yes 200 var 3 [ 0 0 1 1 ]
    window_move yes 200 var 3 [ 0.215 0.61 0.355 1 ] off 0.05 6 [0 0.6 0.4 0 1 0 0.4 -0.6 1 -0.6]
    window_size yes 200 var 3 [ -0.35 0 0 0.5 ]
    # You can also define curves for the following events
    # window_move_float
    # workspace_switch
    # window_fullscreen
    # overview
    # jump
}

client.focused \
  $border_focused \
  $bg_focused \
  $text_focused \
  $indicator_focused \
  $child_border_focused

client.focused_inactive \
  $border_focused_inactive \
  $bg_focused_inactive \
  $text_focused_inactive \
  $indicator_focused_inactive \
  $child_border_focused_inactive

client.unfocused \
  $border_unfocused \
  $bg_unfocused \
  $text_unfocused \
  $indicator_unfocused \
  $child_border_unfocused

client.urgent \
  $border_urgent \
  $bg_urgent \
  $text_urgent \
  $indicator_urgent \
  $child_border_urgent


bar {
  mode top

  position top

  # When the status_command prints a new line to stdout, scrollbar updates.
  # The default just shows the current date and time.
  status_command while date +'%d/%m/%Y %T'; do sleep 1; done

  colors {
    statusline $text_focused
    background $bg_unfocused
    focused_workspace $border_focused $bg_focused $text_focused
    active_workspace $border_focused_inactive $bg_focused_inactive $text_focused_inactive
    inactive_workspace $border_unfocused $bg_unfocused $text_unfocused
    scroller $border_focused_inactive $bg_focused_inactive $text_focused
  }

  tray_padding 6
}

## DEFAULT SWAY COLORS
